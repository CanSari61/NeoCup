name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare Files
        run: |
          mkdir -p www
          cp index.html www/

      - name: Install Tools
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init NeonKacis com.ismin.neon --web-dir www
          npx cap add android

      - name: Build Android
        run: |
          npx cap sync
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeonKacis-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
