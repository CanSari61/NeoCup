name: Build APK
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java Kurulumu (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Capacitor ve Android Kurulumu
        run: |
          # 1. Özel bir çalışma alanı yarat
          mkdir app_workspace
          cd app_workspace

          # 2. Capacitor'ün istediği kimlik dosyasını zorla oluştur
          npm init -y

          # 3. Gerekli paketleri indir
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli

          # 4. Oyun kodunu web klasörüne kopyala
          mkdir www
          if [ -f ../index.html ]; then cp ../index.html www/; else echo "<html><body>Oyun Kodu Bulunamadi</body></html>" > www/index.html; fi

          # 5. Projeyi başlat ve Android'i ekle
          npx cap init NeonKacis com.neon.kacis --web-dir www
          npx cap add android
          npx cap sync

          # 6. APK Derleme işlemini başlat
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK Dosyasini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: NeonKacis-APK
          path: app_workspace/android/app/build/outputs/apk/debug/app-debug.apk
