name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Force Clean and Prepare Web Dir
        run: |
          rm -rf www
          mkdir -p www
          if [ -f index.html ]; then cp index.html www/; else echo "<html><body>Index missing</body></html>" > www/index.html; fi

      - name: Install and Build Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init NeonKacis com.neon.kacis --web-dir www --noprompt
          npx cap add android
          npx cap sync

      - name: Build Android
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeonKacis-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
