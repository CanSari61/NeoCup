name: Build APK
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Cek
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Java Kurulumu (JDK 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Capacitor ve Android Kurulumu
        run: |
          mkdir app_workspace
          cd app_workspace

          npm init -y
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli

          mkdir www
          if [ -f ../index.html ]; then cp ../index.html www/; else echo "<html><body>Oyun Kodu Bulunamadi</body></html>" > www/index.html; fi

          npx cap init NeoCop com.neo.cop --web-dir www
          npx cap add android
          npx cap sync

          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: APK Dosyasini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: NeoCop-APK
          path: app_workspace/android/app/build/outputs/apk/debug/app-debug.apk
